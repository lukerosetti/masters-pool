<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#006747" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Masters Pool 2026 — Pick your golfers, track the leaderboard, win the pool." />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Masters Pool 2026</title>
    <style>
      /* Splash screen while React loads */
      #splash { position:fixed; inset:0; background:#006747; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition:opacity 0.3s; }
      #splash.hide { opacity:0; pointer-events:none; }
      #splash .logo { width:60px; height:60px; border-radius:50%; background:#D4AF37; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:900; color:#006747; font-family:Georgia,serif; margin-bottom:12px; }
      #splash p { color:rgba(255,255,255,0.7); font-size:13px; font-family:Georgia,serif; }
    </style>
  </head>
  <body>
    <div id="splash"><div class="logo">M</div><p>Masters Pool 2026</p></div>
    <div id="root"></div>
    <script>
      // Hide splash when React mounts
      window.addEventListener('load', function() {
        setTimeout(function() {
          var s = document.getElementById('splash');
          if (s) { s.classList.add('hide'); setTimeout(function() { s.remove(); }, 300); }
        }, 500);
      });
    </script>
  </body>
</html>
